server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # index.html никогда не кэшируется — браузер всегда получает свежую версию
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # JS/CSS/assets с хешами в имени — кэшируются навсегда (Vite меняет имя при изменении)
    location ~* \.(js|css|woff|woff2|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
